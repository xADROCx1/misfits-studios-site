name: Sync Lemon Squeezy → products.json

on:
  schedule:
    # Every 6 hours at :00
    - cron: '0 */6 * * *'
  workflow_dispatch: {}   # manual trigger button in the Actions UI

permissions:
  contents: write   # needed to commit the updated products.json

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run LS sync
        env:
          LEMONSQUEEZY_API_KEY: ${{ secrets.LEMONSQUEEZY_API_KEY }}
          LEMONSQUEEZY_STORE_ID: ${{ secrets.LEMONSQUEEZY_STORE_ID }}
        run: node scripts/sync-from-lemonsqueezy.js

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add products.json
          if git diff --staged --quiet; then
            echo "No product changes."
          else
            git commit -m "chore(sync): update products from Lemon Squeezy"
            git push
          fi
